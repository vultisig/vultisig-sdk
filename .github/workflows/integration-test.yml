name: Integration Test

on:
  pull_request:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Integration temporarily skipped
        run: |
          echo "::notice::Full integration (MCP + agent-backend + opencode) is skipped: vultisig/agent-backend is not available."
          echo "Restore the previous workflow when the backend repo exists again."
