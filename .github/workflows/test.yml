name: Test Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [changeset-release/main]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn build:shared

      - name: Build packages
        run: yarn build:all

      - name: Run all unit tests
        run: yarn test

      - name: Generate coverage report
        run: yarn test:coverage
        working-directory: packages/sdk

      # Fork PRs and repos without CODECOV_TOKEN cannot tokenless-upload; do not fail the job then.
      # When secrets.CODECOV_TOKEN is set, upload errors fail the job (strict).
      - name: Upload coverage to Codecov
        continue-on-error: ${{ secrets.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/sdk/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}

      - name: Archive coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: packages/sdk/coverage/
          retention-days: 30

  test-integration:
    name: Integration Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn build:shared

      - name: Build packages
        run: yarn build:all

      - name: Run integration tests
        run: yarn test:integration

  lint-and-type:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@4.13.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build:all

      - name: Run ESLint
        run: yarn lint

      - name: Run TypeScript check
        run: yarn typecheck

      - name: Run Knip
        run: yarn knip

      - name: Check Prettier formatting
        run: yarn format:check

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, lint-and-type]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Integration Tests: ${{ needs.test-integration.result }}"
          echo "Lint, typecheck, knip, format: ${{ needs.lint-and-type.result }}"

          if [ "${{ needs.test-unit.result }}" != "success" ]; then
            echo "Unit tests failed!"
            exit 1
          fi

          if [ "${{ needs.test-integration.result }}" != "success" ]; then
            echo "Integration tests failed!"
            exit 1
          fi

          if [ "${{ needs.lint-and-type.result }}" != "success" ]; then
            echo "Lint, typecheck, knip, or Prettier check failed!"
            exit 1
          fi

          echo "All checks passed!"
