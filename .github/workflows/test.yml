name: Test Suite

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [changeset-release/main]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@4.16.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn build:shared

      - name: Build packages
        run: yarn build:all

      - name: Run all unit tests
        run: yarn test

      - name: Generate coverage report
        run: yarn test:coverage
        working-directory: packages/sdk

      # Fork PRs and repos without CODECOV_TOKEN cannot tokenless-upload; do not fail the job then.
      # When secrets.CODECOV_TOKEN is set, upload errors fail the job (strict).
      - name: Upload coverage to Codecov
        continue-on-error: ${{ secrets.CODECOV_TOKEN == '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./packages/sdk/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: ${{ secrets.CODECOV_TOKEN != '' }}

      - name: Archive coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: packages/sdk/coverage/
          retention-days: 30

  test-integration:
    name: Integration Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@4.16.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build shared packages
        run: yarn build:shared

      - name: Build packages
        run: yarn build:all

      - name: Run integration tests
        run: yarn test:integration

  lint-and-type:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare Yarn
        run: corepack prepare yarn@4.16.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run static quality gate (lint, types, knip, Prettier, SDK/CLI contracts)
        run: yarn check:ci

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, lint-and-type]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Integration Tests: ${{ needs.test-integration.result }}"
          echo "Static quality gate: ${{ needs.lint-and-type.result }}"

          if [ "${{ needs.test-unit.result }}" != "success" ]; then
            echo "Unit tests failed!"
            exit 1
          fi

          if [ "${{ needs.test-integration.result }}" != "success" ]; then
            echo "Integration tests failed!"
            exit 1
          fi

          if [ "${{ needs.lint-and-type.result }}" != "success" ]; then
            echo "Static quality gate failed!"
            exit 1
          fi

          echo "All checks passed!"
