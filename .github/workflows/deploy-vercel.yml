name: Deploy Vercel

on:
  workflow_call:
    outputs:
      url:
        description: "Vercel deployment URL"
        value: ${{ jobs.deploy-vercel.outputs.url }}
  workflow_dispatch:

jobs:
  deploy-vercel:
    name: Deploy Vercel
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "yarn"

      - run: corepack enable
      - run: corepack prepare yarn@4.13.0 --activate
      - run: yarn install --immutable
      # build:shared must run before build:sdk: the SDK rollup bundle
      # imports from packages/mpc-wasm/dist/index.js (and friends) which
      # only exist after the shared packages are built.
      - run: yarn build:shared
      - run: yarn build:sdk

      - run: npm install -g vercel

      - name: Build & Deploy
        id: deploy
        working-directory: ./examples/browser
        run: |
          yarn build
          cp vercel.json dist/
          DEPLOY_URL=$(vercel deploy dist --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
