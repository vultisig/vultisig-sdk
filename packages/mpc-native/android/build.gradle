apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'maven-publish'

group = 'expo.modules.mpcnative'
version = '0.1.0'

android {
    namespace "expo.modules.mpcnative"

    compileSdkVersion safeExtGet("compileSdkVersion", 34)

    defaultConfig {
        minSdkVersion safeExtGet("minSdkVersion", 23)
        targetSdkVersion safeExtGet("targetSdkVersion", 34)
    }

    publishing {
        singleVariant("release") {
            withSourcesJar()
        }
    }

    lint {
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.majorVersion
    }

    sourceSets {
        main.java.srcDirs += 'src/main/java'
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':expo-modules-core')
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${safeExtGet('kotlinVersion', '1.8.10')}"
    // AGP 9+ refuses direct local .aar deps inside an AAR module (would produce
    // a broken bundled AAR). compileOnly gives the Kotlin wrapper access to the
    // SWIG classes; the consumer app re-declares the AARs as runtime deps via
    // an Expo config plugin (see plugins/withMpcNativeAars.js) so the .so JNI
    // libs actually ship in the APK.
    compileOnly fileTree(dir: 'libs', include: ['*.aar'])
}

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}
